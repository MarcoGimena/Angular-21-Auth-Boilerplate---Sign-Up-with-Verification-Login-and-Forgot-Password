<div *ngIf="alerts.length > 0" class="container">
  <div class="m-3">
    <!-- Fixed: removed space in cssClasses(alert) -->
    <div *ngFor="let alert of alerts" [class]="cssClasses(alert)">
      <span [innerHTML]="alert.message"></span>
      <button type="button" class="btn-close" (click)="removeAlert(alert)"></button>
    </div>
  </div>
</div>
